<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Wedding Invitation</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  overflow: hidden;
  background: #000;
  color: #fff;
}

/* 🌸 INTRO SCREEN */
#intro {
  height: 100vh;
  width: 100%;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  transition: transform 0.8s ease;
  position: absolute;
  top: 0;
  left: 0;
}

.flower {
  font-size: 70px;
  filter: grayscale(100%);
  animation: bloom 2s infinite ease-in-out;
}

@keyframes bloom {
  0% { transform: scale(0.95); opacity: 0.7; }
  50% { transform: scale(1.1); opacity: 1; }
  100% { transform: scale(0.95); opacity: 0.7; }
}

.swipe {
  margin-top: 20px;
  font-size: 13px;
  color: #bbb;
  letter-spacing: 1px;
}

/* 💍 INVITATION SCREEN */
#invite {
  height: 100vh;
  width: 100%;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  flex-direction: column;
  padding: 20px;
  position: absolute;
  top: 0;
  left: 0;
}

.hidden {
  display: none;
}

h1 {
  font-size: 28px;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

p {
  color: #ccc;
  margin: 6px 0;
  font-size: 14px;
}

.quote {
  margin-top: 20px;
  font-style: italic;
  color: #888;
  font-size: 13px;
  max-width: 80%;
}

/* MOBILE OPTIMIZATION */
@media screen and (min-width: 768px) {
  body::before {
    content: "Open on mobile for best experience";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 16px;
    z-index: 9999;
  }
}
</style>
</head>

<body>

<!-- 🌸 INTRO -->
<div id="intro">
  <div class="flower">❀</div>
  <div class="swipe">SWIPE UP TO OPEN</div>
</div>

<!-- 💍 INVITATION -->
<div id="invite" class="hidden">
  <h1>ELENA & MARK</h1>
  <p>Together with their families</p>
  <p>June 15, 2026</p>
  <p>Manila Cathedral</p>

  <div class="quote">
    “Two hearts, one love, forever begins here.”
  </div>
</div>

<script>
let intro = document.getElementById("intro");
let invite = document.getElementById("invite");

let startY = 0;

// touch swipe detection
window.addEventListener("touchstart", function(e){
  startY = e.touches[0].clientY;
});

window.addEventListener("touchend", function(e){
  let endY = e.changedTouches[0].clientY;

  if (startY > endY + 50) {
    intro.style.transform = "translateY(-100vh)";
    setTimeout(() => {
      invite.classList.remove("hidden");
    }, 500);
  }
});
</script>

</body>
</html>
