<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ariane & Alden Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* 🚨 LOCK SCROLL */
html, body{
  width:100%;
  height:100%;
  overflow:hidden;
  position:fixed;
  background:#000;
  color:#fff;
  font-family:'Inter',sans-serif;
}

/* 🌫 BACKGROUND */
body{
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.07), transparent 60%),
    radial-gradient(circle at bottom, rgba(255,255,255,0.05), transparent 70%),
    linear-gradient(180deg, #050505, #000);
}

/* 🌸 INTRO */
#intro{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle,#111,#000);
  z-index:100;
  transition:0.8s ease;
}

.flower{
  font-size:75px;
  animation:float 2.5s infinite ease-in-out;
}

@keyframes float{
  0%,100%{transform:scale(0.95);}
  50%{transform:scale(1.1);}
}

.swipe{
  margin-top:15px;
  font-size:11px;
  letter-spacing:3px;
  color:#aaa;
}

/* 💍 INVITE SCREEN */
#invite{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:30px;

  opacity:0;
  transform:translateY(25px);
  transition:0.8s ease;

  pointer-events:none;
  z-index:50;
}

#invite.show{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

/* 🌫 CLEAN BACKGROUND OVERLAY */
#invite::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at center, rgba(255,255,255,0.05), transparent 65%);
  z-index:0;
  pointer-events:none;
}

/* CONTENT ABOVE EVERYTHING */
#invite > *{
  position:relative;
  z-index:2;
}

/* 💎 NAME FIX (THIS FIXES YOUR ISSUE) */
.title{
  font-family:'Playfair Display',serif;
  font-size:36px;
  letter-spacing:6px;
  color:#fff;
  text-shadow:0 3px 15px rgba(0,0,0,0.9);
}

/* SUB TEXT */
.sub{
  font-size:12px;
  color:#aaa;
  margin-bottom:12px;
}

/* IMAGE */
.image{
  width:260px;
  max-width:90%;
  border-radius:16px;
  margin:15px 0;
  filter:grayscale(100%) contrast(130%) brightness(85%);
  border:1px solid #333;
}

/* DETAILS */
.details{
  font-size:14px;
  color:#ddd;
  line-height:1.8;
  background:rgba(255,255,255,0.05);
  padding:16px;
  border-radius:12px;
}

/* QUOTE */
.quote{
  margin-top:15px;
  font-style:italic;
  color:#777;
  font-size:13px;
}

/* BUTTON */
.rsvp{
  margin-top:20px;
  padding:12px 24px;
  border:1px solid #fff;
  border-radius:30px;
  font-size:12px;
  color:#fff;
  text-decoration:none;
}

/* MUSIC */
.music{
  position:fixed;
  top:12px;
  right:12px;
  background:#111;
  border:1px solid #333;
  padding:8px 10px;
  font-size:11px;
  border-radius:20px;
  z-index:200;
}

/* 🌫 PARTICLES */
.particle{
  position:fixed;
  width:4px;
  height:4px;
  background:#fff;
  border-radius:50%;
  opacity:0.08;
  animation:floatUp 10s linear infinite;
}

@keyframes floatUp{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* 💎 SPARKLES */
.sparkle{
  position:fixed;
  width:5px;
  height:5px;
  background:#fff;
  border-radius:50%;
  pointer-events:none;
  animation:spark 0.7s ease-out forwards;
}

@keyframes spark{
  0%{opacity:1;transform:scale(1);}
  100%{opacity:0;transform:scale(3);}
}
</style>
</head>

<body>

<!-- 🎶 MUSIC -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b6c1b1f3.mp3">
</audio>

<button class="music" onclick="document.getElementById('music').play()">
🎶 Music
</button>

<!-- 🌫 PARTICLES -->
<script>
for(let i=0;i<18;i++){
  let p=document.createElement('div');
  p.className='particle';
  p.style.left=Math.random()*100+'vw';
  p.style.animationDuration=(8+Math.random()*6)+'s';
  document.body.appendChild(p);
}
</script>

<!-- 🌸 INTRO -->
<div id="intro">
  <div class="flower">❀</div>
  <div class="swipe">SWIPE UP</div>
</div>

<!-- 💍 INVITE -->
<div id="invite">
  <div class="title">ARIANE & ALDEN</div>
  <div class="sub">together with their families</div>

  <img class="image" src="https://i.imgur.com/376gkH5.jpeg">

  <div class="details">
    📅 January 4, 2027<br>
    🕒 9:00 AM<br>
    📍 Manila Cathedral
  </div>

  <div class="quote">Two hearts, one love, forever begins here.</div>

  <a class="rsvp" href="#">Confirm Attendance</a>
</div>

<!-- 💍 SWIPE LOGIC FIXED -->
<script>
let startY = 0;

const intro = document.getElementById("intro");
const invite = document.getElementById("invite");
const music = document.getElementById("music");

window.addEventListener("touchstart", e=>{
  startY = e.touches[0].clientY;
});

window.addEventListener("touchend", e=>{
  let endY = e.changedTouches[0].clientY;

  if(startY > endY + 50){
    intro.style.opacity = "0";
    intro.style.transform = "scale(1.1)";

    setTimeout(()=>{
      intro.style.display = "none";
      invite.classList.add("show");
    }, 500);

    music.play().catch(()=>{});
  }
});

/* 💎 sparkles */
document.addEventListener("click", e=>{
  for(let i=0;i<4;i++){
    let s=document.createElement("div");
    s.className="sparkle";
    s.style.left=e.clientX+"px";
    s.style.top=e.clientY+"px";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),600);
  }
});
</script>

</body>
</html>
