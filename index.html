<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ariane & Alden Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* 🚨 NO SCROLL */
html, body{
  width:100%;
  height:100%;
  overflow:hidden;
  position:fixed;
  font-family:'Inter',sans-serif;
}

/* ================= INTRO ================= */
#intro{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:10;
  transition:0.8s ease;
}

.flower{
  font-size:75px;
  color:#fff;
  animation:float 2.5s infinite ease-in-out;
}

@keyframes float{
  0%,100%{transform:scale(0.95);}
  50%{transform:scale(1.1);}
}

.swipe{
  margin-top:15px;
  font-size:11px;
  letter-spacing:3px;
  color:#aaa;
}

/* ================= INVITE BACKGROUND ================= */
#invite{
  position:fixed;
  inset:0;

  /* 💍 IMAGE AS BACKGROUND */
  background-image:url("https://i.imgur.com/376gkH5.jpeg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;

  opacity:0;
  transform:scale(1.05);
  transition:1s ease;
  pointer-events:none;
}

/* DARK OVERLAY FOR TEXT READABILITY */
#invite::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.65);
  z-index:0;
}

#invite.show{
  opacity:1;
  transform:scale(1);
  pointer-events:auto;
}

/* CONTENT ALWAYS ABOVE IMAGE */
#invite > *{
  position:relative;
  z-index:2;
  color:#fff;
}

/* ================= TEXT ================= */
.title{
  font-family:'Playfair Display',serif;
  font-size:38px;
  letter-spacing:6px;
  text-shadow:0 2px 20px rgba(0,0,0,0.8);
}

.sub{
  font-size:12px;
  color:#ccc;
  margin-bottom:15px;
}

.details{
  margin-top:15px;
  font-size:14px;
  line-height:1.8;
  background:rgba(255,255,255,0.08);
  padding:16px;
  border-radius:12px;
  backdrop-filter:blur(6px);
}

.quote{
  margin-top:15px;
  font-style:italic;
  color:#bbb;
  font-size:13px;
}

.rsvp{
  margin-top:20px;
  padding:12px 24px;
  border:1px solid #fff;
  border-radius:30px;
  font-size:12px;
  color:#fff;
  text-decoration:none;
}

/* MUSIC */
.music{
  position:fixed;
  top:12px;
  right:12px;
  background:#111;
  border:1px solid #333;
  padding:8px 10px;
  font-size:11px;
  border-radius:20px;
  z-index:20;
}
</style>
</head>

<body>

<!-- 🎶 MUSIC -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b6c1b1f3.mp3">
</audio>

<button class="music" onclick="document.getElementById('music').play()">
🎶 Music
</button>

<!-- 🌸 INTRO -->
<div id="intro">
  <div class="flower">❀</div>
  <div class="swipe">SWIPE UP</div>
</div>

<!-- 💍 INVITE -->
<div id="invite">
  <div class="title">ARIANE & ALDEN</div>
  <div class="sub">together with their families</div>

  <div class="details">
    📅 January 4, 2027<br>
    🕒 9:00 AM<br>
    📍 Manila Cathedral
  </div>

  <div class="quote">Two hearts, one love, forever begins here.</div>

  <a class="rsvp" href="#">Confirm Attendance</a>
</div>

<!-- SWIPE LOGIC -->
<script>
let startY = 0;

const intro = document.getElementById("intro");
const invite = document.getElementById("invite");
const music = document.getElementById("music");

window.addEventListener("touchstart", e=>{
  startY = e.touches[0].clientY;
});

window.addEventListener("touchend", e=>{
  let endY = e.changedTouches[0].clientY;

  if(startY > endY + 50){
    intro.style.opacity = "0";
    intro.style.transform = "scale(1.2)";

    setTimeout(()=>{
      intro.style.display = "none";
      invite.classList.add("show");
    }, 500);

    music.play().catch(()=>{});
  }
});
</script>

</body>
</html>
