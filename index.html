<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ariane & Alden Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* 🚨 LOCK SCROLL COMPLETELY */
html, body{
  width:100%;
  height:100%;
  overflow:hidden;
  position:fixed;
  background:#000;
  color:#fff;
  font-family:'Inter',sans-serif;
}

/* 🌫 FLOATING PARTICLES */
.particle{
  position:fixed;
  width:6px;
  height:6px;
  background:#fff;
  border-radius:50%;
  opacity:0.12;
  animation:floatUp 10s linear infinite;
}

@keyframes floatUp{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* 💎 SPARKLES */
.sparkle{
  position:fixed;
  width:6px;
  height:6px;
  background:#fff;
  border-radius:50%;
  pointer-events:none;
  animation:spark 0.8s ease-out forwards;
}

@keyframes spark{
  0%{transform:scale(1);opacity:1;}
  100%{transform:scale(3);opacity:0;}
}

/* ================= INTRO ================= */
#intro{
  position:fixed;
  inset:0;
  background:radial-gradient(circle,#111,#000);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  transition:1s ease;
  z-index:10;
}

.flower{
  font-size:80px;
  animation:float 2.5s infinite ease-in-out;
}

@keyframes float{
  0%{transform:scale(0.95);}
  50%{transform:scale(1.15);}
  100%{transform:scale(0.95);}
}

.swipe{
  margin-top:15px;
  font-size:11px;
  letter-spacing:3px;
  color:#aaa;
}

/* ================= INVITE ================= */
#invite{
  position:fixed;
  inset:0;

  background:
    radial-gradient(circle at top, rgba(255,255,255,0.06), transparent 60%),
    radial-gradient(circle at bottom, rgba(255,255,255,0.04), transparent 70%),
    #000;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:30px;

  opacity:0;
  transform:translateY(40px);
  transition:1s ease;
  pointer-events:none;
}

/* texture */
#invite::after{
  content:"";
  position:absolute;
  inset:0;
  background-image:url('https://www.transparenttextures.com/patterns/asfalt-light.png');
  opacity:0.08;
}

#invite.show{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

/* CONTENT */
.title{
  font-family:'Playfair Display',serif;
  font-size:34px;
  letter-spacing:6px;
}

.sub{
  font-size:12px;
  color:#aaa;
  margin-bottom:15px;
}

.image{
  width:260px;
  max-width:90%;
  height:auto;
  border-radius:18px;
  margin:15px 0;
  filter:grayscale(100%);
  border:1px solid #333;
}

.divider{
  width:60px;
  height:1px;
  background:#333;
  margin:15px 0;
}

.details{
  font-size:14px;
  color:#ddd;
  line-height:1.9;
  background:rgba(255,255,255,0.05);
  padding:18px;
  border-radius:12px;
}

.quote{
  margin-top:20px;
  font-style:italic;
  color:#777;
  font-size:13px;
}

.rsvp{
  margin-top:25px;
  padding:12px 26px;
  border:1px solid #fff;
  border-radius:30px;
  font-size:12px;
  color:#fff;
  text-decoration:none;
}

/* MUSIC BUTTON */
.music{
  position:fixed;
  top:15px;
  right:15px;
  background:#111;
  border:1px solid #333;
  padding:8px 12px;
  font-size:11px;
  border-radius:20px;
  z-index:20;
}
</style>
</head>

<body>

<!-- 🎶 MUSIC -->
<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b6c1b1f3.mp3">
</audio>

<button class="music" onclick="document.getElementById('bgMusic').play()">
🎶 Music
</button>

<!-- 🌫 PARTICLES -->
<script>
for(let i=0;i<25;i++){
  let p=document.createElement('div');
  p.className='particle';
  p.style.left=Math.random()*100+'vw';
  p.style.animationDuration=(6+Math.random()*6)+'s';
  document.body.appendChild(p);
}
</script>

<!-- 💎 SPARKLES -->
<script>
document.addEventListener("click", e=>{
  for(let i=0;i<6;i++){
    let s=document.createElement("div");
    s.className="sparkle";
    s.style.left=e.clientX+"px";
    s.style.top=e.clientY+"px";
    s.style.transform=`translate(${(Math.random()-0.5)*60}px, ${(Math.random()-0.5)*60}px)`;
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),800);
  }
});
</script>

<!-- 🌸 INTRO -->
<div id="intro">
  <div class="flower">❀</div>
  <div class="swipe">SWIPE UP</div>
</div>

<!-- 💍 INVITE -->
<div id="invite">
  <div class="title">ARIANE & ALDEN</div>
  <div class="sub">together with their families</div>

  <img class="image" src="https://i.imgur.com/376gkH5.jpeg">

  <div class="divider"></div>

  <div class="details">
    📅 January 4, 2027<br>
    🕒 9:00 AM<br>
    📍 Manila Cathedral
  </div>

  <div class="quote">Two hearts, one love, forever begins here.</div>

  <a class="rsvp" href="https://docs.google.com/forms/" target="_blank">
    Confirm Attendance
  </a>
</div>

<!-- SWIPE LOGIC -->
<script>
let startY = 0;

const intro = document.getElementById("intro");
const invite = document.getElementById("invite");
const music = document.getElementById("bgMusic");

window.addEventListener("touchstart", e=>{
  startY = e.touches[0].clientY;
});

window.addEventListener("touchend", e=>{
  let endY = e.changedTouches[0].clientY;

  if(startY > endY + 50){

    intro.style.opacity = "0";
    intro.style.transform = "scale(1.1)";

    setTimeout(()=>{
      invite.classList.add("show");
    }, 600);

    music.play().catch(()=>{});
  }
});
</script>

</body>
</html>
