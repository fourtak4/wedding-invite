<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ariane & Alden Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100vh;
  overflow:hidden;
  background:#000;
  color:#fff;
  font-family:'Inter',sans-serif;
}

.particle{
  position:absolute;
  width:6px;
  height:6px;
  background:#fff;
  border-radius:50%;
  opacity:0.3;
  animation:floatUp 6s linear infinite;
}

@keyframes floatUp{
  from{transform:translateY(100vh);opacity:0;}
  to{transform:translateY(-10vh);opacity:0.6;}
}

#intro{
  position:fixed;
  inset:0;
  background:radial-gradient(circle,#111,#000);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  transition:all 1s ease;
  z-index:10;
}

.flower{
  font-size:80px;
  animation:float 2.5s infinite ease-in-out;
}

@keyframes float{
  0%{transform:scale(0.95);}
  50%{transform:scale(1.15);}
  100%{transform:scale(0.95);}
}

.swipe{
  margin-top:15px;
  font-size:11px;
  letter-spacing:3px;
  color:#aaa;
}

#invite{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:30px;
  opacity:0;
  transform:translateY(30px);
  transition:1s ease;
}

#invite.show{
  opacity:1;
  transform:translateY(0);
}

.title{
  font-family:'Playfair Display',serif;
  font-size:34px;
  letter-spacing:6px;
}

.sub{
  font-size:12px;
  color:#aaa;
  margin-bottom:15px;
}

/* FIXED IMAGE (NO CROP) */
.image{
  width:260px;
  max-width:90%;
  height:auto;
  border-radius:18px;
  margin:15px 0;
  filter:grayscale(100%);
  border:1px solid #333;
}

.divider{
  width:60px;
  height:1px;
  background:#333;
  margin:15px 0;
}

.details{
  font-size:14px;
  color:#ddd;
  line-height:1.9;
  background:rgba(255,255,255,0.05);
  padding:18px;
  border-radius:12px;
}

.quote{
  margin-top:20px;
  font-style:italic;
  color:#777;
  font-size:13px;
}

.rsvp{
  margin-top:25px;
  padding:12px 26px;
  border:1px solid #fff;
  border-radius:30px;
  font-size:12px;
  color:#fff;
  text-decoration:none;
}

@media(min-width:768px){
body::before{
  content:"Open on mobile for best experience";
  position:fixed;
  inset:0;
  background:#000;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
}
</style>
</head>

<body>

<!-- MUSIC AUTO PLAY -->
<audio id="bgMusic" autoplay loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b6c1b1f3.mp3" type="audio/mpeg">
</audio>

<script>
// force autoplay on mobile after first interaction
window.addEventListener("touchstart", function(){
  document.getElementById("bgMusic").play();
}, {once:true});
</script>

<script>
for(let i=0;i<25;i++){
  let p=document.createElement('div');
  p.className='particle';
  p.style.left=Math.random()*100+'vw';
  p.style.animationDuration=(3+Math.random()*5)+'s';
  document.body.appendChild(p);
}
</script>

<div id="intro">
  <div class="flower">❀</div>
  <div class="swipe">SWIPE UP</div>
</div>

<div id="invite">
  <div class="title">ARIANE & ALDEN</div>
  <div class="sub">together with their families</div>

  <img class="image" src="https://i.imgur.com/376gkH5.jpeg" alt="Wedding">

  <div class="divider"></div>

  <div class="details">
    📅 January 4, 2027<br>
    🕒 9:00 AM<br>
    📍 Rockwell
  </div>

  <div class="quote">Two hearts, one love, forever begins here.</div>

  <a class="rsvp" href="https://docs.google.com/forms/" target="_blank">Confirm Attendance</a>
</div>

<script>
let startY=0;
const intro=document.getElementById('intro');
const invite=document.getElementById('invite');

window.addEventListener('touchstart',e=>startY=e.touches[0].clientY);
window.addEventListener('touchend',e=>{
let endY=e.changedTouches[0].clientY;
if(startY>endY+50){
intro.style.transform='translateY(-100%)';
intro.style.opacity='0';
setTimeout(()=>invite.classList.add('show'),700);
}
});
</script>

</body>
</html>
