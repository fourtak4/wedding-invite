<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ariane & Alden Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  overflow:hidden;
  background:#000;
  color:#fff;
  font-family:'Inter', sans-serif;
}

/* INTRO */
#intro{
  position:fixed;
  inset:0;
  background:radial-gradient(circle,#111,#000);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  transition:all 1s ease;
  z-index:10;
}

.flower{
  font-size:80px;
  animation:float 2.5s infinite ease-in-out;
  filter:grayscale(100%);
}

@keyframes float{
  0%{transform:scale(0.95) rotate(0deg);opacity:0.5;}
  50%{transform:scale(1.1) rotate(6deg);opacity:1;}
  100%{transform:scale(0.95) rotate(0deg);opacity:0.5;}
}

.swipe{
  margin-top:15px;
  font-size:11px;
  letter-spacing:3px;
  color:#aaa;
  animation:blink 2s infinite;
}

@keyframes blink{
  0%,100%{opacity:0.3;}
  50%{opacity:1;}
}

/* INVITE */
#invite{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:30px;
  opacity:0;
  transform:translateY(20px);
  transition:1s ease;
}

#invite.show{
  opacity:1;
  transform:translateY(0);
}

.title{
  font-family:'Playfair Display', serif;
  font-size:34px;
  letter-spacing:5px;
  margin-bottom:8px;
}

.sub{
  font-size:12px;
  color:#aaa;
  letter-spacing:2px;
  margin-bottom:20px;
}

.divider{
  width:60px;
  height:1px;
  background:#333;
  margin:15px 0;
}

.details{
  font-size:14px;
  color:#ddd;
  line-height:1.8;
  background:rgba(255,255,255,0.05);
  padding:18px;
  border-radius:12px;
}

.quote{
  margin-top:20px;
  font-style:italic;
  color:#777;
  font-size:13px;
}

.rsvp{
  margin-top:25px;
  padding:12px 26px;
  border:1px solid #fff;
  border-radius:30px;
  font-size:12px;
  letter-spacing:2px;
  color:#fff;
  text-decoration:none;
  transition:0.3s;
}

.rsvp:hover{
  background:#fff;
  color:#000;
}

/* MOBILE ONLY */
@media(min-width:768px){
body::before{
  content:"Open on mobile for best experience";
  position:fixed;
  inset:0;
  background:#000;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="flower">❀</div>
  <div class="swipe">SWIPE UP TO OPEN</div>
</div>

<!-- INVITE -->
<div id="invite">
  <div class="title">ARIANE & ALDEN</div>
  <div class="sub">together with their families</div>

  <div class="divider"></div>

  <div class="details">
    📅 June 15, 2026<br>
    🕒 3:00 PM<br>
    📍 Manila Cathedral
  </div>

  <div class="quote">
    “Two hearts, one love, forever begins here.”
  </div>

  <a class="rsvp" href="#">RSVP</a>
</div>

<script>
let startY = 0;
const intro = document.getElementById("intro");
const invite = document.getElementById("invite");

window.addEventListener("touchstart", e=>{
  startY = e.touches[0].clientY;
});

window.addEventListener("touchend", e=>{
  let endY = e.changedTouches[0].clientY;

  if(startY > endY + 50){
    intro.style.transform = "translateY(-100%)";
    intro.style.opacity = "0";

    setTimeout(()=>{
      invite.classList.add("show");
    }, 700);
  }
});
</script>

</body>
</html>
